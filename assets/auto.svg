<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6CFFB6"/>
      <stop offset="1" stop-color="#31D980"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9EF6FF" stop-opacity=".85"/>
      <stop offset="1" stop-color="#58F8FF" stop-opacity=".25"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>

  <!-- shadow -->
  <ellipse cx="64" cy="108" rx="36" ry="10" fill="#000" opacity=".25"/>

  <!-- roof -->
  <path d="M28 28c0-10 8-18 18-18h36c10 0 18 8 18 18v10H28V28z"
        fill="#0E0F15" filter="url(#s)"/>

  <!-- body -->
  <path d="M30 38h68c10 0 18 8 18 18v30c0 14-10 26-24 28l-12 2H48l-12-2C22 112 12 100 12 86V56c0-10 8-18 18-18z"
        fill="url(#g)" stroke="#0E0F15" stroke-width="4" stroke-linejoin="round" filter="url(#s)"/>

  <!-- windshield -->
  <path d="M38 48h52c6 0 10 4 10 10v10H28V58c0-6 4-10 10-10z"
        fill="url(#glass)" stroke="#0E0F15" stroke-width="4" stroke-linejoin="round"/>
  <path d="M46 52l-8 16" stroke="#0E0F15" stroke-width="3" opacity=".45"/>
  <path d="M82 52l8 16" stroke="#0E0F15" stroke-width="3" opacity=".45"/>

  <!-- stripes -->
  <rect x="26" y="78" width="76" height="8" rx="4" fill="#FFD24A" opacity=".95"/>
  <rect x="28" y="90" width="72" height="6" rx="3" fill="#FFD24A" opacity=".85"/>

  <!-- headlight -->
  <circle cx="64" cy="100" r="10" fill="#FFD24A" stroke="#0E0F15" stroke-width="4"/>
  <circle cx="64" cy="100" r="4" fill="#fff" opacity=".85"/>

  <!-- wheels -->
  <g fill="#0E0F15">
    <circle cx="36" cy="104" r="10"/>
    <circle cx="92" cy="104" r="10"/>
  </g>
  <g fill="#fff" opacity=".18">
    <circle cx="36" cy="104" r="4"/>
    <circle cx="92" cy="104" r="4"/>
  </g>
</svg>
